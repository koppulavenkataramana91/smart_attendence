<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-fingerprint"></i>
                <h1>Smart Attendance</h1>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <select id="role" required>
                        <option value="">Select Role</option>
                        <option value="admin">Administrator</option>
                        <option value="staff">Staff</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="id" placeholder="ID/Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div id="message"></div>
        </div>
    </div>
    <script>
        // Users data embedded directly to avoid external file loading issues
        const users = {
            admin: { id: 'admin', password: 'admin123', role: 'admin', name: 'Admin User' },
            staff: { id: 'S001', password: 'staff123', role: 'staff', name: 'John Doe', department: 'Mathematics' },
            student: { id: 'STU001', password: 'student123', role: 'student', name: 'Jane Smith', class: 'Class A' }
        };

        // Wait for DOM to fully load
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const messageEl = document.getElementById('message');
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const role = document.getElementById('role').value;
                const id = document.getElementById('id').value;
                const password = document.getElementById('password').value;
                
                // Clear previous messages
                messageEl.textContent = '';
                messageEl.className = '';
                
                // Check credentials
                const user = users[role] || users[id];
                
                if (user && user.id === id && user.password === password && user.role === role) {
                    // Store user data
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // Redirect with small delay to ensure storage completes
                    setTimeout(() => {
                        if (role === 'admin') {
                            window.location.replace('admin.html');
                        } else if (role === 'staff') {
                            window.location.replace('staff.html');
                        } else if (role === 'student') {
                            window.location.replace('student.html');
                        }
                    }, 100);
                } else {
                    showMessage('Invalid credentials! Try: admin/admin123, S001/staff123, STU001/student123', 'error');
                }
            });
        });

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = type;
        }
    </script>
</body>
</html>
